// ═══════════════════════════════════════════════

function daysLeft(item){
  if(!item.addedDate||!item.expDays)return null;
  return Math.ceil((new Date(item.addedDate).getTime()+item.expDays*86400000-Date.now())/86400000);
}
function itemStatus(item){
  if(item.qty<=0)return"empty";
  const d=daysLeft(item);
  if(d!==null&&d<=0)return"expired";
  if(d!==null&&d<=1)return"urgent";
  if(d!==null&&d<=3)return"expiring";
  if(item.qty<=item.crit&&item.crit>0)return"critical";
  if(item.qty<=item.low&&item.low>0)return"low";
  return"ok";
}
function resolveItem(name){
  const key=name.toLowerCase().trim();
  const resolved=(ALIASES[key]||name).toLowerCase();
  return S.items.find(i=>i.name.toLowerCase()===resolved||i.name.toLowerCase()===key);
}
function alertCount(){
  return S.items.filter(i=>["urgent","expired","expiring"].includes(itemStatus(i))&&i.qty>0).length;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function syncAddItemFromDOM(){
  if(!S.addItem)return;
  const g=id=>document.getElementById(id);
  if(g("ai-name"))S.addItem.name=g("ai-name").value;
  if(g("ai-qty"))S.addItem.qty=parseFloat(g("ai-qty").value)||0;
  if(g("ai-unit"))S.addItem.unit=g("ai-unit").value;
  if(g("ai-exp"))S.addItem.expDays=parseInt(g("ai-exp").value)||0;
  if(g("ai-price"))S.addItem.price=parseFloat(g("ai-price").value)||0;
  if(g("ai-low"))S.addItem.low=parseInt(g("ai-low").value)||0;
}
function syncAddMealFromDOM(){
  if(!S.addMeal)return;
  const g=id=>document.getElementById(id);

}

                <span style="font-size:10px;color:${li.color};font-weight:600">${li.icon} ${li.label}</span>

// ── MEALS ────────────────────────────────────────────────────
function mealsTab(){
  const catColor={breakfast:"#7C3AED",lunch:"#2563EB",dinner:"#DC2626"};
  const isLog=S.mealsView==="log";

  function logView(){
    function timeAgo(d){
      const diff=(Date.now()-new Date(d))/3600000;
      if(diff<1)return"Just now";
      if(diff<24)return"Today";
      if(diff<48)return"Yesterday";
      if(diff<168)return Math.floor(diff/24)+" days ago";
      return new Date(d).toLocaleDateString();
    }
    if(!S.cookLog.length)return`<div style="text-align:center;padding:60px 16px">
      <div style="font-size:48px;margin-bottom:12px">🍳</div>
      <div style="font-size:16px;font-weight:700;color:#E8EEF8;margin-bottom:8px">No meals logged yet</div>
      <div style="font-size:13px;color:var(--t2)">Cook a meal from Recipes and it'll appear here.</div>
    </div>`;
    return S.cookLog.map(e=>`<div style="background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border)">
      <div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div style="min-width:0">
          <div style="font-weight:700;font-size:14px;color:#E8EEF8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.recipeName)}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:2px">🍳 ${timeAgo(e.cookedAt)}</div>
        </div>
        <button data-action="undo-meal" data-lid="${e.id}" style="flex-shrink:0;padding:7px 12px;background:#450A0A;border:1px solid #7F1D1D;border-radius:8px;color:#F87171;font-size:11px;font-weight:700">↩ Undo</button>
      </div>
      <div style="padding:0 14px 12px;border-top:1px solid var(--border)">
        ${e.ings.map(i=>`<div style="font-size:11px;color:var(--t2);padding:3px 0">• ${esc(i.n)} — ${i.q} ${esc(i.u)}</div>`).join("")}
      </div>
    </div>`).join("");
  }

  const filtered=S.recipes.filter(r=>r.cat===S.mealTab);
  return`<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="padding:0 16px 10px;flex-shrink:0">
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button data-action="meals-view" data-view="recipes" style="flex:1;padding:9px;background:${!isLog?"#2563EB":"var(--card)"};color:#fff;border-radius:10px;font-size:12px;font-weight:700;border:1px solid ${!isLog?"#2563EB":"var(--border)"}">🍽️ Recipes</button>
        <button data-action="meals-view" data-view="log" style="flex:1;padding:9px;background:${isLog?"#7C3AED":"var(--card)"};color:#fff;border-radius:10px;font-size:12px;font-weight:700;border:1px solid ${isLog?"#7C3AED":"var(--border)"}">📋 Cook Log ${S.cookLog.length>0?"("+S.cookLog.length+")":""}</button>
      </div>
      ${!isLog?`<div style="display:flex;gap:6px;margin-bottom:8px">
        ${["breakfast","lunch","dinner"].map(t=>`<button data-action="meal-tab" data-mtab="${t}" style="flex:1;padding:8px 4px;background:${S.mealTab===t?catColor[t]:"var(--card2)"};color:#fff;border-radius:10px;font-size:11px;font-weight:700;border:1px solid ${S.mealTab===t?"transparent":"var(--border)"}">${{breakfast:"🌅 Breakfast",lunch:"☀️ Lunch",dinner:"🌙 Dinner"}[t]}</button>`).join("")}
      </div>
      <button data-action="open-add-meal" style="width:100%;padding:10px;background:var(--card);border:1px dashed var(--border);border-radius:10px;color:var(--t2);font-size:13px;font-weight:700;margin-bottom:2px">🍽️ + Create New Meal</button>`:""}
    </div>
    <div class="scroll" style="padding:0 16px">
      ${isLog?logView():filtered.map(r=>{
        const ings=r.ings.map(i=>{const f=resolveItem(i.n);const have=f?f.qty:0;return{...i,have,ok:have>=i.q};});
        const allGood=ings.every(i=>i.ok);
        const cc=catColor[r.cat]||"#3B82F6";
        return`<div style="background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid ${allGood?"#1A3A25":"var(--border)"}">
          <div style="background:${cc};padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:700;font-size:15px;color:#fff">${esc(r.name)}</div>
              <div style="font-size:10px;color:rgba(255,255,255,.75);margin-top:2px">${r.gf?"<span style='background:rgba(255,255,255,.2);padding:1px 6px;border-radius:10px;margin-right:5px;font-weight:700'>GF ✓</span>":""}${r.servings} servings</div>
            </div>
            ${allGood?"<span style='font-size:22px'>✅</span>":""}
          </div>
          <div style="padding:10px 16px">
            ${ings.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:${i.ok?"#4ADE80":"#F87171"};border-bottom:1px solid var(--border)">
              <span>${i.ok?"✓":"✗"} ${esc(i.n)}</span>
              <span style="color:var(--t2)">${i.have}/${i.q} ${i.u}</span>
            </div>`).join("")}
            <button data-action="start-cook" data-rid="${r.id}" style="width:100%;margin-top:10px;padding:11px;background:${allGood?"#16A34A":"#374151"};color:#fff;border-radius:10px;font-size:13px;font-weight:700">${allGood?"🍳 Cook This!":"🍳 Cook Anyway"}</button>
          </div>
        </div>`;}).join("")}
    </div>
  </div>`;}

// ── PLAN ─────────────────────────────────────────────────────
function planTab(){
  const mealIcon={breakfast:"🌅",lunch:"☀️",dinner:"🌙"};
  const mealLabel={breakfast:"Breakfast",lunch:"Lunch",dinner:"Dinner"};
  const planCount=DAYS.reduce((n,d)=>n+["breakfast","lunch","dinner"].filter(m=>S.weekPlan[d][m]).length,0);
  const sel="font-family:inherit;color:var(--t1);background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 8px;font-size:12px;width:100%;outline:none;appearance:none;-webkit-appearance:none";
  function recipeOpts(selId){
    const groups=["breakfast","lunch","dinner"];
    const gLabel={breakfast:"🌅 Breakfast",lunch:"☀️ Lunch",dinner:"🌙 Dinner"};
    return`<option value="">— skip —</option>`+groups.map(g=>{
      const recs=S.recipes.filter(r=>r.cat===g);
      if(!recs.length)return"";
      return`<optgroup label="${gLabel[g]}">${recs.map(r=>`<option value="${r.id}"${r.id===selId?" selected":""}>${esc(r.name)}</option>`).join("")}</optgroup>`;
    }).join("");
  }
  return`<div class="scroll fade" style="padding:0 16px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:4px">
      <div>
        <div style="font-size:13px;font-weight:700;color:#E8EEF8">${planCount} of 21 meals planned</div>
        <div style="font-size:10px;color:var(--t2);margin-top:2px">👨‍👩‍👧‍👦 Feeding ${FAMILY_SIZE} people</div>
      </div>
      <button data-action="clear-plan" style="padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:11px;font-weight:600">Clear All</button>
    </div>
    ${DAYS.map(d=>`<div style="background:var(--card);border-radius:14px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border)">
      <div style="background:var(--card2);padding:9px 14px;font-size:12px;font-weight:800;color:#E8EEF8;border-bottom:1px solid var(--border)">${DAY_LABELS[d]}</div>
      ${["breakfast","lunch","dinner"].map(m=>`<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:15px;flex-shrink:0">${mealIcon[m]}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:9px;font-weight:700;color:var(--t2);margin-bottom:3px;letter-spacing:.04em">${mealLabel[m].toUpperCase()}</div>
          <select data-action="plan-select" data-day="${d}" data-meal="${m}" style="${sel}">${recipeOpts(S.weekPlan[d][m])}</select>
        </div>
      </div>`).join("")}
    </div>`).join("")}
    <button data-action="goto-shop" style="width:100%;padding:14px;background:#0D9488;color:#fff;border-radius:14px;font-size:14px;font-weight:700;margin-top:4px;box-shadow:0 4px 20px #0D948833">🛒 Generate Shopping List</button>
  </div>`;}

// ── SHOP ─────────────────────────────────────────────────────
function shopTab(){
  const needed={};
  let hasPlan=false;
  DAYS.forEach(d=>{
    ["breakfast","lunch","dinner"].forEach(m=>{
      const rid=S.weekPlan[d][m];
      if(!rid)return;
      hasPlan=true;
      const recipe=S.recipes.find(r=>r.id===rid);
      if(!recipe)return;
      const mult=FAMILY_SIZE/(recipe.servings||1);
      recipe.ings.forEach(i=>{
        const f=resolveItem(i.n);
        const have=f?f.qty:0;
        const need=Math.max(0,parseFloat((i.q*mult-have).toFixed(2)));
        if(need>0){
          const k=(f?.name||i.n).toLowerCase();
          if(needed[k])needed[k].need=parseFloat((needed[k].need+need).toFixed(2));
          else needed[k]={name:f?.name||i.n,need,unit:i.u,price:f?.price||0};
        }
      });
    });
  });
  if(!hasPlan)return`<div class="scroll fade" style="padding:0 16px">
    <div style="text-align:center;padding:60px 16px">
      <div style="font-size:48px;margin-bottom:12px">📅</div>
      <div style="font-size:16px;font-weight:700;color:#E8EEF8;margin-bottom:8px">No plan yet</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5">Plan your week's meals first,<br>then hit Generate Shopping List.</div>
      <button data-action="tab" data-tab="plan" style="padding:12px 24px;background:#0D9488;color:#fff;border-radius:12px;font-size:14px;font-weight:700">📅 Go to Planner</button>
    </div>
  </div>`;
  const list=Object.values(needed).sort((a,b)=>a.name.localeCompare(b.name));
  const hasPrices=list.some(i=>i.price>0&&!S.shopBought[i.name]);
  const total=list.filter(i=>!S.shopBought[i.name]&&i.price>0).reduce((s,i)=>s+i.price,0);
  return`<div class="scroll fade" style="padding:0 16px 16px">
    <div style="background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;color:var(--t2);margin-bottom:2px">ITEMS TO BUY</div><div style="font-size:26px;font-weight:800;color:#3B82F6">${list.length}</div></div>
      ${hasPrices?`<div style="text-align:right"><div style="font-size:10px;color:var(--t2);margin-bottom:2px">EST. COST</div><div style="font-size:26px;font-weight:800;color:#22C55E">$${total.toFixed(2)}</div></div>`:""}
    </div>
    ${list.length===0?`<div style="text-align:center;padding:40px 0;color:var(--t2)">🎉 You have everything for this week!</div>`:
      list.map(i=>{const bought=S.shopBought[i.name];return`<div data-action="toggle-bought" data-item="${esc(i.name)}" style="background:${bought?"#0F2A1A":"var(--card)"};border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;border:1px solid ${bought?"#166534":"var(--border)"};opacity:${bought?.6:1}">
        <div style="width:24px;height:24px;border-radius:6px;border:2px solid ${bought?"#22C55E":"var(--border)"};background:${bought?"#22C55E":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${bought?"<span style='color:#fff;font-size:14px;font-weight:700'>✓</span>":""}
        </div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px;color:#E8EEF8;text-decoration:${bought?"line-through":"none"}">${esc(i.name)}</div>
          <div style="font-size:11px;color:var(--t2)">Need ${i.need} ${esc(i.unit)}</div>
        </div>
        ${i.price>0?`<div style="font-weight:700;color:#22C55E;font-size:14px">$${i.price.toFixed(2)}</div>`:""}
      </div>`;}).join("")}
  </div>`;}

// ── ALERTS ───────────────────────────────────────────────────
function alertsTab(){
  const exp   =S.items.filter(i=>itemStatus(i)==="expired"&&i.qty>0);
  const urg   =S.items.filter(i=>itemStatus(i)==="urgent"&&i.qty>0);
  const soon  =S.items.filter(i=>itemStatus(i)==="expiring"&&i.qty>0);
  const reord =S.items.filter(i=>i.qty<=i.low&&i.low>0&&i.qty>0&&!["expired","urgent","expiring"].includes(itemStatus(i)));
  function section(title,color,list,subFn){
    if(!list.length)return"";
    return`<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:${color};margin-bottom:8px;letter-spacing:.06em">${title}</div>
      ${list.map(i=>{const d=daysLeft(i);return`<div style="background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:6px;border-left:3px solid ${color};display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px;color:#E8EEF8">${esc(i.name)}</div>
          <div style="font-size:11px;color:${color};margin-top:2px">${subFn(i,d)}</div>
        </div>
        <div style="text-align:right;font-weight:700;font-size:16px;color:#E8EEF8">${i.qty} <span style="font-size:10px;color:var(--t2)">${esc(i.unit)}</span></div>
      </div>`;}).join("")}
    </div>`;}
  const total=exp.length+urg.length+soon.length+reord.length;
  return`<div class="scroll fade" style="padding:0 16px">
    ${total===0?`<div style="text-align:center;padding:60px 0"><div style="font-size:48px;margin-bottom:12px">🎉</div><div style="font-size:18px;font-weight:700;color:#22C55E">All clear!</div><div style="color:var(--t2);font-size:13px;margin-top:6px">No alerts right now.</div></div>`:`
      ${section("💀 EXPIRED — DISCARD NOW","#EF4444",exp,()=>"Past expiry — throw out")}
      ${section("🔥 USE TODAY OR TOMORROW","#F97316",urg,(i,d)=>d<=0?"Expired today":"Expires tomorrow")}
      ${section("⏰ USE WITHIN 3 DAYS","#EAB308",soon,(i,d)=>`${d} day${d!==1?"s":""} remaining`)}
      ${section("🛒 REORDER SOON","#3B82F6",reord,i=>`${i.qty} ${i.unit} left — below reorder level`)}`}
  </div>`;}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render(){
  const ac=alertCount();
  let content="";
  if(S.tab==="home")   content=homeTab();
  if(S.tab==="pantry") content=pantryTab();
  if(S.tab==="meals")  content=mealsTab();
  if(S.tab==="plan")   content=planTab();
  if(S.tab==="shop")   content=shopTab();
  if(S.tab==="alerts") content=alertsTab();

  document.getElementById("app").innerHTML=`
    ${header()}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;padding-top:8px">${content}</div>
    ${bottomNav()}
    ${S.toast?toast(S.toast):""}
    ${S.cooking?cookModal():""}
    ${S.addItem?addItemModal():""}
    ${S.addMeal?addMealModal():""}
    ${S.undoMeal?undoMealModal():""}
  `;
  attachEvents();
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function showToast(msg){
  if(toastTimer)clearTimeout(toastTimer);
  setState({toast:msg});
  toastTimer=setTimeout(()=>setState({toast:null}),2800);
}

function attachEvents(){
  // Search input
  const si=document.querySelector("[data-action='pantry-search']");
  if(si){
    si.addEventListener("input",e=>{S.pantrySearch=e.target.value;render();});
    si.addEventListener("focus",e=>e.preventDefault());
  }

  // Plan selects — update weekPlan without re-render
  document.querySelectorAll("[data-action='plan-select']").forEach(sel=>{
    sel.addEventListener("change",e=>{
      const {day,meal}=sel.dataset;
      S.weekPlan[day][meal]=e.target.value||null;
      saveWeekPlan();
    });
  });

  // Keep modal text fields synced to state without re-rendering
  [["ai-name",v=>{if(S.addItem)S.addItem.name=v;}],
   ["ai-unit",v=>{if(S.addItem)S.addItem.unit=v;}],
   ["am-name",v=>{if(S.addMeal)S.addMeal.name=v;}]
  ].forEach(([id,fn])=>{const el=document.getElementById(id);if(el)el.addEventListener("input",e=>fn(e.target.value));});

}

function handleClick(e){
  const btn=e.target.closest("[data-action]");
  if(!btn||btn.dataset.action==="noop")return;
  const action=btn.dataset.action;

  if(action==="tab"){setState({tab:btn.dataset.tab});}
  else if(action==="meal-tab"){setState({mealTab:btn.dataset.mtab});}
  else if(action==="pantry-loc"){setState({pantryLoc:btn.dataset.loc});}
  else if(action==="inc"){
    const updated=S.items.map(i=>i.id===btn.dataset.id?{...i,qty:parseFloat((i.qty+1).toFixed(2)),addedDate:now()}:i);
    setState({items:updated});saveItems();
  }
  else if(action==="dec"){
    const updated=S.items.map(i=>i.id===btn.dataset.id?{...i,qty:Math.max(0,parseFloat((i.qty-1).toFixed(2)))}:i);
    const item=updated.find(i=>i.id===btn.dataset.id);
    setState({items:updated});saveItems();
    if(item&&item.qty===0)showToast("📦 "+item.name+" is empty");
  }
  else if(action==="start-cook"){
    const recipe=S.recipes.find(r=>r.id===btn.dataset.rid);
    if(!recipe)return;
    const ings=recipe.ings.map(i=>{const f=resolveItem(i.n);const have=f?f.qty:0;return{...i,have,ok:have>=i.q};});
    setState({cooking:{recipe,ings}});
  }
  else if(action==="close-modal"){setState({cooking:null});}
  else if(action==="confirm-cook"){
    const {recipe,ings}=S.cooking;
    let updated=[...S.items];
    ings.forEach(i=>{
      const f=resolveItem(i.n);
      if(f)updated=updated.map(p=>p.id===f.id?{...p,qty:Math.max(0,parseFloat((p.qty-i.q).toFixed(2)))}:p);
    });
    const logEntry={id:"l"+Date.now().toString(36),recipeId:recipe.id,recipeName:recipe.name,ings:recipe.ings,cookedAt:now()};
    const newLog=[logEntry,...S.cookLog];
    saveCookLog();saveItems();
    setState({items:updated,cooking:null,cookLog:newLog});
    showToast("🍳 Cooked "+recipe.name+"! Check Cook Log to undo.");
  }
  else if(action==="toggle-bought"){
    const name=btn.dataset.item;
    const nb={...S.shopBought,[name]:!S.shopBought[name]};
    setState({shopBought:nb});
  }
  // ── Meals view toggle ────────────────────────────────────
  else if(action==="meals-view"){setState({mealsView:btn.dataset.view});}
  // ── Cook log / undo ──────────────────────────────────────
  else if(action==="undo-meal"){
    const entry=S.cookLog.find(e=>e.id===btn.dataset.lid);
    if(entry)setState({undoMeal:entry});
  }
  else if(action==="close-undo"){setState({undoMeal:null});}
  else if(action==="confirm-undo"){
    const e=S.undoMeal;
    let updated=[...S.items];
    e.ings.forEach(i=>{
      const f=resolveItem(i.n);
      if(f)updated=updated.map(p=>p.id===f.id?{...p,qty:parseFloat((p.qty+i.q).toFixed(2))}:p);
    });
    const newLog=S.cookLog.filter(l=>l.id!==e.id);
    saveCookLog();saveItems();
    setState({items:updated,undoMeal:null,cookLog:newLog});
    showToast("↩ "+e.recipeName+" undone — pantry restored!");
  }
  // ── Plan actions ─────────────────────────────────────────
  else if(action==="clear-plan"){S.weekPlan=emptyPlan();saveWeekPlan();render();}
  else if(action==="goto-shop"){setState({tab:"shop"});}
  // ── Add Item actions ──────────────────────────────────────
  else if(action==="open-add-item"){
    setState({addItem:{name:"",qty:1,unit:"count",loc:"fridge",cat:"other",expDays:7,price:0,low:0}});
  }
  else if(action==="close-add-item"){setState({addItem:null});}
  else if(action==="ai-loc"){
    syncAddItemFromDOM();S.addItem.loc=btn.dataset.loc;render();
  }
  else if(action==="ai-cat"){
    syncAddItemFromDOM();S.addItem.cat=btn.dataset.cat;render();
  }
  else if(action==="save-item"){
    syncAddItemFromDOM();
    const f=S.addItem;
    if(!f.name.trim()){showToast("⚠️ Item name is required");return;}
    const newId="u"+Date.now().toString(36);
    const newItem=mkItem(newId,f.name.trim(),parseFloat(f.qty)||0,f.unit.trim()||"count",f.loc,f.cat,parseInt(f.expDays)||0,parseFloat(f.price)||0,parseInt(f.low)||0,0);
    const updated=[...S.items,newItem];
    saveItems();
    setState({items:updated,addItem:null});
    showToast("✅ "+f.name.trim()+" added to pantry!");
  }
  // ── Add Meal actions ──────────────────────────────────────
  else if(action==="open-add-meal"){
    setState({addMeal:{name:"",cat:"dinner",servings:4,gf:true,ings:[]}});
  }
  else if(action==="close-add-meal"){setState({addMeal:null});}
  else if(action==="am-cat"){
    syncAddMealFromDOM();S.addMeal.cat=btn.dataset.cat;render();
  }
  else if(action==="am-gf"){
    syncAddMealFromDOM();S.addMeal.gf=!S.addMeal.gf;render();
  }
  else if(action==="add-ing"){
    syncAddMealFromDOM();
    const ingName=(document.getElementById("am-ing-name")?.value||"").trim();
    const ingQty=parseFloat(document.getElementById("am-ing-qty")?.value)||1;
    let ingUnit=(document.getElementById("am-ing-unit")?.value||"").trim();
    if(!ingName){showToast("⚠️ Enter an ingredient name");return;}
    if(!ingUnit){
      const found=S.items.find(i=>i.name.toLowerCase()===ingName.toLowerCase());
      ingUnit=found?found.unit:"count";
    }
    S.addMeal.ings.push({n:ingName,q:ingQty,u:ingUnit});
    render();
  }
  else if(action==="remove-ing"){
    syncAddMealFromDOM();
    S.addMeal.ings.splice(parseInt(btn.dataset.idx),1);
    render();
  }
  else if(action==="save-meal"){
    syncAddMealFromDOM();
    const f=S.addMeal;
    if(!f.name.trim()){showToast("⚠️ Meal name is required");return;}
    if(!f.ings.length){showToast("⚠️ Add at least one ingredient");return;}
    const newId="r"+Date.now().toString(36);
    const newRecipe={id:newId,name:f.name.trim(),gf:f.gf,cat:f.cat,servings:parseInt(f.servings)||1,ings:f.ings};
    const updated=[...S.recipes,newRecipe];
    saveRecipes();
    setState({recipes:updated,addMeal:null,mealTab:f.cat});
    showToast("🍽️ "+f.name.trim()+" added to meals!");
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  let items,recipes;
  try{items=JSON.parse(localStorage.getItem("fk-items"));}catch{}
  try{recipes=JSON.parse(localStorage.getItem("fk-recipes"));}catch{}
  let plan,log;
  try{plan=JSON.parse(localStorage.getItem("fk-plan"));}catch{}
  try{log=JSON.parse(localStorage.getItem("fk-log"));}catch{}
  S.items=items&&items.length>0?items:DEFAULT_ITEMS;
  S.recipes=recipes&&recipes.length>0?recipes:DEFAULT_RECIPES;
  S.weekPlan=plan||emptyPlan();
  S.cookLog=log||[];
  if(!items||!items.length)saveItems();
  if(!recipes||!recipes.length)saveRecipes();
  if(!plan)saveWeekPlan();
  render();
  document.getElementById("app").addEventListener("click",handleClick);
}

init();
</script>
</body>
</html>
