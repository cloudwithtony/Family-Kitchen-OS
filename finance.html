<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Varen Finance">
<meta name="theme-color" content="#0B1221">
<style>html{height:-webkit-fill-available}body{min-height:-webkit-fill-available}</style>
<title>Varen Finance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0B1221;color:#F0F4FF;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px;overscroll-behavior:none}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:#1E2D45;border-radius:3px}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
button:active{opacity:.75;transform:scale(.96)}
input{font-family:inherit;outline:none;-webkit-appearance:none;border:none}
select{font-family:inherit;outline:none;-webkit-appearance:none;border:none;background:none}
@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.fade{animation:fd .22s ease}
.spin{animation:spin .7s linear infinite}
.card{background:linear-gradient(135deg,#111B2E 0%,#0D1526 100%);border:1px solid #1E2D45;border-radius:16px}
.glow-green{box-shadow:0 0 20px #10B98122}
.glow-blue{box-shadow:0 0 20px #3B82F622}
@media(min-width:700px){.scroll{padding:0 28px 100px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════
// SEED DATA
// ══════════════════════════════════════════════════
const SEED_BILLS=[
  {id:'rent',    name:'Rent',                 weekly:200,  icon:'🏠'},
  {id:'groc',    name:'Groceries',            weekly:250,  icon:'🛒'},
  {id:'phone',   name:'Phone',                weekly:52.50,icon:'📱'},
  {id:'car_ins', name:'Car Insurance',        weekly:37.50,icon:'🚗'},
  {id:'gas',     name:'Gas',                  weekly:25,   icon:'⛽'},
  {id:'gr_fam',  name:'Grooming — You & Boys',weekly:45,   icon:'✂️'},
  {id:'gr_lex',  name:'Grooming — Lexi',      weekly:80,   icon:'💇'},
  {id:'gr_dau',  name:'Grooming — Daughters', weekly:10,   icon:'🎀'},
  {id:'subs',    name:'Subscriptions',        weekly:8,    icon:'📺'},
  {id:'amz',     name:'Amazon Seller',        weekly:9.23, icon:'📦'},
];
const SEED_FUNDS=[
  {id:'emergency',name:'Emergency Fund',weekly:50, icon:'🛡️',color:'#3B82F6',mission:'sec'},
  {id:'invest',   name:'Investment',    weekly:245,icon:'🏗️',color:'#F59E0B',mission:'wlth'},
  {id:'kids',     name:'Kid Fund',      weekly:75, icon:'🌱',color:'#10B981',mission:'exp'},
  {id:'date',     name:'Date Night',    weekly:50, icon:'💙',color:'#8B5CF6',mission:'exp'},
  {id:'travel',   name:'Travel Fund',   weekly:50, icon:'✈️',color:'#06B6D4',mission:'exp'},
];
const ACCT_TYPES={checking:'CHECKING',savings:'SAVINGS',hysa:'HI-YIELD',invest:'INVEST',business:'BUSINESS'};
const ACCT_COLORS={checking:'#3B82F6',savings:'#10B981',hysa:'#06B6D4',invest:'#F59E0B',business:'#8B5CF6'};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let S={tab:'dash',view:null,toast:null,refreshing:false,lastRefresh:null};
let toastTimer=null;
let eventsReady=false;

function initData(){
  return{anthon:1030,lexi:580,
    bills:SEED_BILLS.map(b=>({...b})),
    funds:SEED_FUNDS.map(f=>({...f})),
    goals:[],weeks:[],accounts:[]};
}
function load(){try{return JSON.parse(localStorage.getItem('vf'))||initData();}catch{return initData();}}
function save(d){try{localStorage.setItem('vf',JSON.stringify(d));}catch{}}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function $$(n,sign=true){const abs='$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return (n<0&&sign)?'-'+abs:abs;}
function pct(a,b){return b>0?((a/b)*100).toFixed(1):'0.0';}
function netClr(n,inc){const p=inc>0?n/inc:0;return p>=.20?'#10B981':p>=.08?'#F59E0B':'#EF4444';}
function uid(){return 'a'+Math.random().toString(36).slice(2,9);}

function weekLabel(){
  const now=new Date();
  const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${M[mon.getMonth()]} ${mon.getDate()} – ${M[sun.getMonth()]} ${sun.getDate()}, ${sun.getFullYear()}`;
}
function weekKey(){
  const now=new Date();const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  return`${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}
function timeAgo(d){
  if(!d)return'never';
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return'just now';if(s<3600)return`${Math.floor(s/60)}m ago`;
  if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`;
}
function goalAccountRec(weeks){
  if(weeks<=8)return{label:'Regular Savings',color:'#10B981',type:'savings',why:'Short window — keep liquid'};
  if(weeks<=26)return{label:'High-Yield Savings',color:'#06B6D4',type:'hysa',why:'Earn interest while saving'};
  return{label:'Investment Account',color:'#F59E0B',type:'invest',why:'Long enough horizon to grow'};
}

// ══════════════════════════════════════════════════
// SVG CHARTS
// ══════════════════════════════════════════════════
function donutChart(bills,funds,surplus,total){
  const cx=90,cy=90,r=68,sw=20;
  const circ=2*Math.PI*r;
  const segs=[
    {v:Math.max(0,bills),  c:'#3B82F6'},
    {v:Math.max(0,funds),  c:'#F59E0B'},
    {v:Math.max(0,surplus),c:'#10B981'},
  ].filter(s=>s.v>0&&total>0);
  let cum=0;
  const paths=segs.map(s=>{
    const dash=(s.v/total)*circ;
    const offset=circ*0.25-cum;
    cum+=dash;
    return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}"
      stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="butt"/>`;
  });
  return`<svg width="180" height="180" viewBox="0 0 180 180">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1A2840" stroke-width="${sw}"/>
    ${paths.join('')}
  </svg>`;
}

function barChart(weeks,w=280,h=72){
  if(!weeks.length)return`<svg width="${w}" height="${h}"><text x="${w/2}" y="${h/2}" fill="#3A4D66" text-anchor="middle" font-size="12">Log weeks to see chart</text></svg>`;
  const show=weeks.slice(-12);
  const maxV=Math.max(...show.map(wk=>Math.abs(wk.net)),1);
  const bw=Math.floor(w/show.length)-3;
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${show.map((wk,i)=>{
      const bh=Math.max(3,Math.round((Math.abs(wk.net)/maxV)*(h-4)));
      const x=i*(bw+3);const y=h-bh;
      const c=netClr(wk.net,wk.total);
      return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${c}" rx="3" opacity=".85">
        <animate attributeName="height" from="0" to="${bh}" dur=".4s" begin="${i*.04}s" fill="freeze"/>
        <animate attributeName="y" from="${h}" to="${y}" dur=".4s" begin="${i*.04}s" fill="freeze"/>
      </rect>`;
    }).join('')}
  </svg>`;
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render(){
  document.getElementById('app').innerHTML=build();
  if(!eventsReady){
    const app=document.getElementById('app');
    app.addEventListener('click',onClick);
    app.addEventListener('input',onInput);
    eventsReady=true;
  }
}
function showToast(msg){
  if(toastTimer)clearTimeout(toastTimer);
  S.toast=msg;render();
  toastTimer=setTimeout(()=>{S.toast=null;render();},2600);
}

function build(){
  const toast=S.toast?`<div style="position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#1E2D45;color:#F0F4FF;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.8);border:1px solid #2A3D55;pointer-events:none">${esc(S.toast)}</div>`:'';
  return`
    ${buildHeader()}
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column" class="fade">
      ${S.tab==='dash'    ?buildDash()    :''}
      ${S.tab==='goals'   ?buildGoals()   :''}
      ${S.tab==='accounts'?buildAccounts():''}
      ${S.tab==='history' ?buildHistory() :''}
    </div>
    ${buildNav()}
    ${toast}
    ${S.view?buildModal():''}`;
}

// ── HEADER ──────────────────────────────────────────
function buildHeader(){
  const d=load();
  const total=d.anthon+d.lexi;
  const bills=d.bills.reduce((s,b)=>s+b.weekly,0);
  const funds=d.funds.reduce((s,f)=>s+f.weekly,0);
  const net=total-bills-funds;
  const nc=netClr(net,total);
  const lastW=d.weeks.length>=2?d.weeks[d.weeks.length-2]:null;
  const diff=lastW?net-lastW.net:null;
  const diffStr=diff!=null?`<span style="font-size:11px;color:${diff>=0?'#10B981':'#EF4444'};margin-left:8px">${diff>=0?'▲':'▼'} ${$$(Math.abs(diff))} vs last wk</span>`:'';

  return`<div style="padding:14px 18px 12px;flex-shrink:0;border-bottom:1px solid #1A2840;background:linear-gradient(180deg,#0D1628 0%,#0B1221 100%)">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:#3B82F6;font-weight:700;letter-spacing:.1em;margin-bottom:2px">VAREN FINANCE</div>
        <div style="font-size:12px;color:#4A5D7A">${weekLabel()}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:right">
          <div style="font-size:26px;font-weight:900;color:${nc};line-height:1;letter-spacing:-.02em">${$$(net)}</div>
          <div style="font-size:10px;color:#4A5D7A;margin-top:1px">weekly surplus${diffStr}</div>
        </div>
        <button data-action="refresh" style="width:34px;height:34px;border-radius:50%;background:#1A2840;border:1px solid #2A3D55;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">
          <span ${S.refreshing?'class="spin"':''}>↻</span>
        </button>
      </div>
    </div>
  </div>`;
}

// ── DASHBOARD ────────────────────────────────────────
function buildDash(){
  const d=load();
  const total=d.anthon+d.lexi;
  const bills=d.bills.reduce((s,b)=>s+b.weekly,0);
  const funds=d.funds.reduce((s,f)=>s+f.weekly,0);
  const net=total-bills-funds;
  const nc=netClr(net,total);

  return`<div class="scroll">
    <!-- DONUT + INCOME -->
    <div class="card" style="margin-top:14px;padding:20px 16px;margin-bottom:14px;display:flex;gap:16px;align-items:center">
      <div style="position:relative;flex-shrink:0">
        ${donutChart(bills,funds,net,total)}
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
          <div style="font-size:11px;color:#4A5D7A;font-weight:600">WEEKLY</div>
          <div style="font-size:22px;font-weight:900;color:#F0F4FF;line-height:1.1">${$$(total)}</div>
          <div style="font-size:9px;color:#4A5D7A;margin-top:1px">combined</div>
        </div>
      </div>
      <div style="flex:1">
        ${[
          {label:'Anthon',val:d.anthon,sub:pct(d.anthon,total)+'%',c:'#94A3B8'},
          {label:'Lexi',  val:d.lexi,  sub:pct(d.lexi,total)+'%',  c:'#94A3B8'},
        ].map(r=>`<div style="margin-bottom:10px">
          <div style="font-size:10px;color:#4A5D7A;font-weight:600;letter-spacing:.06em">${r.label.toUpperCase()}</div>
          <div style="font-size:18px;font-weight:800;color:${r.c};line-height:1.1">${$$(r.val)}</div>
          <div style="font-size:9px;color:#2A3D55;margin-top:1px">${r.sub} of combined</div>
        </div>`).join('')}
        <button data-action="open-income" style="font-size:11px;color:#3B82F6;background:#1A2840;border:1px solid #2A3D55;padding:5px 12px;border-radius:8px;font-weight:600">Edit Income</button>
      </div>
    </div>

    <!-- LEGEND -->
    <div style="display:flex;gap:10px;margin-bottom:14px;padding:0 2px">
      ${[['#3B82F6','Bills',bills,total],['#F59E0B','Funds',funds,total],[nc,'Surplus',net,total]].map(([c,l,v,t])=>`
      <div style="flex:1;background:#111B2E;border:1px solid #1A2840;border-radius:10px;padding:10px 8px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:4px">
          <div style="width:7px;height:7px;border-radius:50%;background:${c}"></div>
          <div style="font-size:9px;color:#4A5D7A;font-weight:600">${l.toUpperCase()}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${c}">${$$(v)}</div>
        <div style="font-size:9px;color:#2A3D55;margin-top:1px">${pct(v,t)}%</div>
      </div>`).join('')}
    </div>

    <!-- BILLS -->
    <div style="font-size:10px;color:#3A4D66;font-weight:700;letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between">
      <span>BILLS</span><span style="color:#4A5D7A">${$$(bills)}/wk</span>
    </div>
    <div class="card" style="overflow:hidden;margin-bottom:14px">
      ${d.bills.map((b,i)=>allocRow(b.icon+' '+b.name,$$(b.weekly),pct(b.weekly,total),'#3B82F6',i<d.bills.length-1)).join('')}
    </div>

    <!-- FUNDS -->
    <div style="font-size:10px;color:#3A4D66;font-weight:700;letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between">
      <span>MISSION FUNDS</span><span style="color:#4A5D7A">${$$(funds)}/wk</span>
    </div>
    <div class="card" style="overflow:hidden;margin-bottom:14px">
      ${d.funds.map((f,i)=>allocRow(f.icon+' '+f.name,$$(f.weekly),pct(f.weekly,total),f.color,i<d.funds.length-1)).join('')}
    </div>

    <!-- NET CARD -->
    <div class="card ${net>=0?'glow-green':''}" style="padding:20px;margin-bottom:14px;text-align:center;border-color:${nc}44">
      <div style="font-size:10px;color:#4A5D7A;font-weight:700;letter-spacing:.1em;margin-bottom:8px">AFTER BILLS & FUNDS</div>
      <div style="font-size:52px;font-weight:900;color:${nc};line-height:1;letter-spacing:-.02em">${$$(net)}</div>
      <div style="font-size:12px;color:#4A5D7A;margin-top:6px">${pct(net,total)}% of income</div>
      ${net<0?`<div style="margin-top:12px;padding:8px 14px;background:#7F1D1D22;border:1px solid #EF444433;border-radius:10px;font-size:12px;color:#FCA5A5">⚠️ Outgoing exceeds income by ${$$(-net)}</div>`:''}
    </div>

    <button data-action="log-week" style="width:100%;padding:15px;background:linear-gradient(135deg,#059669,#10B981);color:#fff;border-radius:14px;font-size:14px;font-weight:800;letter-spacing:.02em;box-shadow:0 4px 20px #10B98144;margin-bottom:6px">
      ✓ &nbsp;Log This Week
    </button>
  </div>`;
}

function allocRow(name,amt,pctStr,barClr,divider){
  return`<div style="padding:11px 14px;${divider?'border-bottom:1px solid #131D2E':''}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span style="font-size:13px;color:#94A3B8">${esc(name)}</span>
      <span style="font-size:13px;font-weight:700;color:#F0F4FF">${amt} <span style="font-size:10px;color:#3A4D66;font-weight:400">${pctStr}%</span></span>
    </div>
    <div style="height:3px;background:#131D2E;border-radius:2px">
      <div style="width:${pctStr}%;height:100%;background:${barClr};border-radius:2px;opacity:.7;transition:width .5s ease"></div>
    </div>
  </div>`;
}

// ── GOALS ─────────────────────────────────────────────
function buildGoals(){
  const d=load();
  const total=d.anthon+d.lexi;
  const bills=d.bills.reduce((s,b)=>s+b.weekly,0);
  const funds=d.funds.reduce((s,f)=>s+f.weekly,0);
  const surplus=total-bills-funds;
  const goalWkly=d.goals.reduce((s,g)=>s+g.weekly,0);
  const free=surplus-goalWkly;

  return`<div class="scroll">
    <div style="margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      ${[[$$(surplus),'Surplus','avail/wk','#10B981'],[$$(goalWkly),'Allocated','goals/wk',goalWkly>surplus?'#EF4444':'#F59E0B'],[$$(free),'Free','after goals',free>=0?'#10B981':'#EF4444']].map(([v,l,s,c])=>`
      <div class="card" style="padding:12px 8px;text-align:center">
        <div style="font-size:9px;color:#3A4D66;letter-spacing:.06em;margin-bottom:4px">${l.toUpperCase()}</div>
        <div style="font-size:14px;font-weight:800;color:${c}">${v}</div>
        <div style="font-size:9px;color:#4A5D7A;margin-top:2px">${s}</div>
      </div>`).join('')}
    </div>

    ${goalWkly>surplus?`<div style="padding:12px 14px;background:#7F1D1D22;border:1px solid #EF444433;border-radius:12px;font-size:12px;color:#FCA5A5;margin-bottom:14px;line-height:1.6">⚠️ Goals need <strong>${$$(goalWkly-surplus)}/wk</strong> more than your surplus. Extend a timeline or reduce a target.</div>`:''}

    <div style="font-size:10px;color:#3A4D66;font-weight:700;letter-spacing:.08em;margin-bottom:10px">SAVINGS GOALS</div>

    ${d.goals.length===0?`<div class="card" style="padding:32px;text-align:center;color:#3A4D66;font-size:13px">No goals yet. Add your first one below.</div>`:''}

    ${d.goals.map((g,i)=>{
      const left=Math.max(0,g.total-(g.saved||0));
      const weeksLeft=g.weekly>0?Math.ceil(left/g.weekly):0;
      const progress=g.total>0?Math.min(100,((g.saved||0)/g.total)*100):0;
      const share=surplus>0?g.weekly/surplus:0;
      const gc=share>=.40?'#EF4444':share>=.25?'#F59E0B':'#10B981';
      const rec=goalAccountRec(g.weeks);
      const linked=d.accounts.find(a=>a.goalId===g.id);
      const done=(g.saved||0)>=g.total;
      return`<div class="card" style="padding:16px;margin-bottom:10px;${done?'border-color:#10B98144':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:#F0F4FF">${esc(g.name)}</div>
            <div style="font-size:11px;color:#4A5D7A;margin-top:2px">${$$(g.saved||0)} of ${$$(g.total)} saved</div>
          </div>
          <button data-action="del-goal" data-idx="${i}" style="color:#3A4D66;font-size:20px;background:none;padding:0 4px;line-height:1">×</button>
        </div>
        <div style="height:6px;background:#131D2E;border-radius:4px;margin-bottom:12px;overflow:hidden">
          <div style="width:${progress.toFixed(1)}%;height:100%;background:${done?'#10B981':gc};border-radius:4px;transition:width .5s ease"></div>
        </div>
        ${done?`<div style="text-align:center;font-size:13px;color:#10B981;font-weight:700;margin-bottom:10px">🎉 Fully funded!</div>`:`
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
          ${miniStat($$(g.weekly)+'/wk','required',gc)}
          ${miniStat(weeksLeft+' wks','to go','#94A3B8')}
          ${miniStat((share*100).toFixed(0)+'%','of surplus',share>=.40?'#EF4444':share>=.25?'#F59E0B':'#94A3B8')}
        </div>
        <!-- ACCOUNT REC -->
        <div style="background:#0D1628;border:1px solid ${linked?rec.color+'44':'#1A2840'};border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px">

function onInput(e){
  if(S.view?.type==='add-goal'){
    const t=parseFloat(document.getElementById('g-total')?.value)||0;
    const w=parseFloat(document.getElementById('g-weeks')?.value)||0;
    const prev=document.getElementById('g-preview');
    if(!prev)return;
    if(t>0&&w>0){
      const d=load();
      const total=d.anthon+d.lexi;
      const bills=d.bills.reduce((s,b)=>s+b.weekly,0);
      const funds=d.funds.reduce((s,f)=>s+f.weekly,0);
      const surplus=total-bills-funds;
      const wkly=t/w;
      const share=surplus>0?wkly/surplus:0;
      const gc=share>=.40?'#EF4444':share>=.25?'#F59E0B':'#10B981';
      S.view.data={...(S.view.data||{}),total:t,weeks:w};
      prev.style.borderColor=gc+'44';
      prev.innerHTML=`<span style="font-size:24px;font-weight:900;color:${gc}">${$$(wkly)}/wk</span><span style="font-size:11px;color:#4A5D7A;margin-left:10px">${(share*100).toFixed(0)}% of surplus</span>`;
    } else {
      if(prev){prev.style.borderColor='#1E2D45';prev.innerHTML=`<span style="font-size:12px;color:#3A4D66">Enter cost + weeks to see required weekly amount</span>`;}
    }
  }
}

function onClick(e){
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const a=btn.dataset.action;
  if(a==='noop')return;

  if(a==='tab'){S.tab=btn.dataset.tab;S.view=null;render();return;}
  if(a==='close-modal'){S.view=null;render();return;}
  if(a==='open-income'){S.view={type:'income'};render();return;}
  if(a==='open-add-goal'){S.view={type:'add-goal',data:{}};render();return;}
  if(a==='open-add-account'){S.view={type:'add-account'};render();return;}
  if(a==='log-payment'){S.view={type:'log-payment',idx:parseInt(btn.dataset.idx)};render();return;}
  if(a==='update-balance'){S.view={type:'update-balance',idx:parseInt(btn.dataset.idx)};render();return;}
  if(a==='link-goal'){S.view={type:'link-goal',goalIdx:parseInt(btn.dataset.idx)};render();return;}

  if(a==='refresh'){
    S.refreshing=true;render();
    setTimeout(()=>{S.refreshing=false;S.lastRefresh=new Date().toISOString();render();showToast('Updated ✓');},900);
    return;
  }

  if(a==='edit-goal'){
    const idx=parseInt(btn.dataset.idx);const d=load();const g=d.goals[idx];
    S.view={type:'add-goal',editIdx:idx,data:{name:g.name,total:g.total,weeks:g.weeks}};render();return;
  }

  if(a==='save-income'){
    const av=parseFloat(document.getElementById('inc-a')?.value)||0;
    const lv=parseFloat(document.getElementById('inc-l')?.value)||0;
    const d=load();d.anthon=av;d.lexi=lv;save(d);S.view=null;showToast('Income updated ✓');return;
  }

  if(a==='log-week'){
    const d=load();const key=weekKey();
    if(d.weeks.find(w=>w.key===key)){showToast('Already logged this week');return;}
    const total=d.anthon+d.lexi;
    const bills=d.bills.reduce((s,b)=>s+b.weekly,0);
    const funds=d.funds.reduce((s,f)=>s+f.weekly,0);
    d.weeks.push({key,weekLabel:weekLabel(),anthon:d.anthon,lexi:d.lexi,total,bills,funds,net:total-bills-funds,date:new Date().toISOString()});
    save(d);showToast('Week logged ✓');return;
  }

  if(a==='save-goal'){
    const name=(document.getElementById('g-name')?.value||'').trim();
    const total=parseFloat(document.getElementById('g-total')?.value)||0;
    const weeks=parseFloat(document.getElementById('g-weeks')?.value)||0;
    if(!name){showToast('Enter a goal name');return;}
    if(total<=0){showToast('Enter the total cost');return;}
    if(weeks<=0){showToast('Enter target weeks');return;}
    const d=load();
    const weekly=parseFloat((total/weeks).toFixed(2));
    if(S.view.editIdx!=null){
      const g=d.goals[S.view.editIdx];
      g.name=name;g.total=total;g.weeks=weeks;g.weekly=weekly;
    } else {
      d.goals.push({id:uid(),name,total,weeks,weekly,saved:0,created:new Date().toISOString()});
    }
    save(d);S.view=null;showToast(`${S.view?.editIdx!=null?'Updated':'Added'} — ${$$(weekly)}/wk`);return;
  }

  if(a==='del-goal'){
    const idx=parseInt(btn.dataset.idx);const d=load();
    const name=d.goals[idx]?.name;d.goals.splice(idx,1);save(d);showToast(`"${name}" removed`);return;
  }

  if(a==='confirm-payment'){
    const amt=parseFloat(document.getElementById('pay-amt')?.value)||0;
    if(amt<=0){showToast('Enter an amount');return;}
    const d=load();const g=d.goals[S.view.idx];
    if(!g){S.view=null;render();return;}
    g.saved=(g.saved||0)+amt;
    // also update linked account balance
    const linked=d.accounts.find(ac=>ac.goalId===g.id);
    if(linked)linked.balance=(linked.balance||0)+amt;
    save(d);S.view=null;
    showToast(g.saved>=g.total?`🎉 "${g.name}" fully funded!`:`+${$$(amt)} logged`);return;
  }

  if(a==='save-account'){
    const name=(document.getElementById('acct-name')?.value||'').trim();
    const inst=(document.getElementById('acct-inst')?.value||'').trim();
    const type=document.getElementById('acct-type')?.value||'savings';
    const bal=parseFloat(document.getElementById('acct-bal')?.value)||0;
    if(!name){showToast('Enter an account name');return;}
    const d=load();
    d.accounts.push({id:uid(),name,institution:inst,type,balance:bal,lastUpdated:new Date().toISOString()});
    save(d);S.view=null;showToast(`${name} added ✓`);return;
  }

  if(a==='del-account'){
    const idx=parseInt(btn.dataset.idx);const d=load();
    const name=d.accounts[idx]?.name;d.accounts.splice(idx,1);save(d);showToast(`"${name}" removed`);return;
  }

  if(a==='confirm-balance'){
    const bal=parseFloat(document.getElementById('bal-new')?.value);
    if(isNaN(bal)){showToast('Enter a balance');return;}
    const d=load();d.accounts[S.view.idx].balance=bal;
    d.accounts[S.view.idx].lastUpdated=new Date().toISOString();
    save(d);S.view=null;showToast('Balance updated ✓');return;
  }

  if(a==='confirm-link'){
    const goalIdx=parseInt(btn.dataset.goal);
    const acctIdx=parseInt(btn.dataset.acct);
    const d=load();
    const goalId=d.goals[goalIdx]?.id;
    // clear any previous links to this goal
    d.accounts.forEach(ac=>{if(ac.goalId===goalId)delete ac.goalId;});
    d.accounts[acctIdx].goalId=goalId;
    save(d);S.view=null;showToast('Account linked ✓');return;
  }

  if(a==='unlink-goal'){
    const idx=parseInt(btn.dataset.idx);const d=load();
    const goalId=d.goals[idx]?.id;
    d.accounts.forEach(ac=>{if(ac.goalId===goalId)delete ac.goalId;});
    save(d);showToast('Account unlinked');return;
  }

  if(a==='add-txn'){
    S.view={type:'update-balance',idx:parseInt(btn.dataset.idx)};render();return;
  }
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
function init(){
  const el=document.getElementById('app');
  if(!el){setTimeout(init,50);return;}
  S.lastRefresh=new Date().toISOString();
  render();
}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
</script>
